name: Build and Deploy
on:
  push:
    branches:
      - main
permissions:
  contents: write
jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout 🛎️
        uses: actions/checkout@v2.3.1

      - name: Deps
        run: |
          make --version
          make deps

      # --- LANDING PAGE MODE ---
      # To switch back to the full site, replace this Build step with:
      #   make clean
      #   make generate
      #   echo "promptengineering.rocks" > static/CNAME
      - name: Build 🔧
        run: |
          mkdir -p static/bg
          cp landing/index.html landing/style.css landing/script.js landing/logo-white.svg static/
          cp home/assets/bg/* static/bg/
          echo "promptengineering.rocks" > static/CNAME

      - name: Deploy 🚀
        uses: JamesIves/github-pages-deploy-action@v4.4.0
        with:
          branch: gh-pages
          folder: static
